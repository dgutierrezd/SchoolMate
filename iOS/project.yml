name: SchoolMateAI
options:
  bundleIdPrefix: com.schoolmateai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  SchoolMateAI:
    type: application
    platform: iOS
    sources:
      - path: SchoolMateAI
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: SchoolMateAI/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.schoolmateai.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: SchoolMateAI/SchoolMateAI.entitlements
      properties:
        aps-environment: development
